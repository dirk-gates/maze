name: Maze
options:
  bundleIdPrefix: com.dirkgates
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_LANGUAGE: en
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

packages:
  MazeKit:
    path: ../MazeKit

targets:
  Maze:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources
        excludes:
          - "Info.plist"
    dependencies:
      - package: MazeKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dirkgates.Maze
        PRODUCT_NAME: Maze
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: Sources/Info.plist
      properties:
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "1"
        LSApplicationCategoryType: public.app-category.games
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHumanReadableCopyright: "Copyright (c) 2026 Dirk Gates"
